<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>สร้างแบบสอบถาม - หน้าเพิ่มคำถาม</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: sans-serif; margin: 32px; }
    h1 { margin-top: 0; }
    #builder { max-width: 760px; }
    .controls { margin: 12px 0 20px; }
    input[type="text"] { padding: 8px; width: 100%; max-width: 560px; }
    button { padding: 8px 14px; margin: 8px 6px 0 0; cursor: pointer; }
    ul { padding-left: 18px; }
    li { margin: 8px 0; }
    .qtext { font-weight: 600; }
    .inline { display: inline-flex; gap: 8px; align-items: center; }
    .muted { color: #666; font-size: 13px; }
  </style>
</head>
<body>
  <h1>ระบบสร้างแบบสอบถาม — เพิ่มคำถาม</h1>

  <div id="builder">
    <div class="controls">
      <label for="newQuestion" class="muted">พิมพ์คำถาม แล้วกดเพิ่ม</label><br />
      <input type="text" id="newQuestion" placeholder="เช่น: กรุณาแนะนำตัวเองสั้น ๆ" />
      <button id="addBtn">เพิ่มคำถาม</button>
      <button id="clearBtn" title="ล้างรายการคำถามทั้งหมด">ล้างทั้งหมด</button>
    </div>

    <ul id="questionList"></ul>

    <div style="margin-top: 18px;">
      <button id="saveAndGo">บันทึกคำถาม & ไปทำแบบสอบถาม</button>
    </div>

    <p class="muted">
      * ระบบจะบันทึกคำถามลงในเบราว์เซอร์ (localStorage) ด้วยคีย์ <code>survey_questions</code>
    </p>
  </div>

  <script>
    const STORAGE_KEY = 'survey_questions';
    let questions = [];

    // โหลดคำถามที่อาจถูกบันทึกไว้ก่อนหน้า
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try { questions = JSON.parse(saved) || []; } catch(e) { questions = []; }
    }

    const listEl = document.getElementById('questionList');
    const newInput = document.getElementById('newQuestion');

    function render() {
      if (!questions.length) {
        listEl.innerHTML = '<li class="muted">ยังไม่มีคำถาม</li>';
        return;
      }
      listEl.innerHTML = questions.map((q, idx) => `
        <li>
          <span class="qtext">${idx+1}. ${q}</span>
          <span class="inline">
            <button onclick="editQuestion(${idx})">แก้ไข</button>
            <button onclick="removeQuestion(${idx})">ลบ</button>
            <button onclick="moveUp(${idx})" ${idx===0?'disabled':''}>↑</button>
            <button onclick="moveDown(${idx})" ${idx===questions.length-1?'disabled':''}>↓</button>
          </span>
        </li>
      `).join('');
    }

    function addQuestion() {
      const q = newInput.value.trim();
      if (!q) { alert('กรุณาพิมพ์คำถาม'); return; }
      questions.push(q);
      newInput.value = '';
      render();
    }

    function removeQuestion(i) {
      questions.splice(i,1);
      render();
    }

    function editQuestion(i) {
      const current = questions[i];
      const updated = prompt('แก้ไขคำถาม:', current);
      if (updated === null) return;
      const v = updated.trim();
      if (!v) { alert('คำถามห้ามว่าง'); return; }
      questions[i] = v;
      render();
    }

    function moveUp(i) {
      if (i<=0) return;
      [questions[i-1], questions[i]] = [questions[i], questions[i-1]];
      render();
    }
    function moveDown(i) {
      if (i>=questions.length-1) return;
      [questions[i+1], questions[i]] = [questions[i], questions[i+1]];
      render();
    }

    function clearAll() {
      if (!questions.length) return;
      if (confirm('ต้องการล้างคำถามทั้งหมดหรือไม่?')) {
        questions = [];
        render();
      }
    }

    function saveAndGo() {
      if (!questions.length) { alert('กรุณาเพิ่มคำถามอย่างน้อย 1 ข้อ'); return; }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(questions));
      // ลบคำตอบเก่าถ้ามี
      localStorage.removeItem('survey_answers');
      // ไปหน้าทำแบบสอบถาม
      location.href = 'survey.html';
    }

    document.getElementById('addBtn').addEventListener('click', addQuestion);
    document.getElementById('clearBtn').addEventListener('click', clearAll);
    document.getElementById('saveAndGo').addEventListener('click', saveAndGo);
    newInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') addQuestion();
    });

    render();
    // ทำให้ปุ่ม handler สามารถเรียกใช้ได้จาก HTML
    window.editQuestion = editQuestion;
    window.removeQuestion = removeQuestion;
    window.moveUp = moveUp;
    window.moveDown = moveDown;
  </script>
</body>
</html>
