<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <title>Survey</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui, sans-serif; margin: 28px; max-width: 760px; }
    .q { font-weight:700; margin: 16px 0 8px; }
    .opt { padding:10px 12px; border:1px solid #ccc; border-radius:8px; margin:6px 6px 6px 0; display:inline-block; cursor:pointer; }
    .opt.selected { background:#111; color:#fff; border-color:#111; }
    textarea, input[type="text"] { width:100%; padding:10px; border:1px solid #ccc; border-radius:8px; }
    .actions { margin-top:18px; display:flex; gap:10px; }
    .btn { padding:10px 16px; background:#111; color:#fff; border:none; border-radius:8px; cursor:pointer; }
    .muted { color:#666; font-size:13px; }
  </style>
<!-- โหลด Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- โหลด config และประกาศ auth/db -->
<script src="assets/firebase.js"></script>
</head>
<body>
  <h1>Questionnaire</h1>
  <p class="muted">
    * Note: No sensitive personal information will be collected. Your responses are used solely to better understand perspectives.
  <br>*** The system is still being adjusted and tested, so changes may occur at any time.</br>
  </p>

  <div id="app"></div>
  <div class="actions">
    <button class="btn" id="nextBtn">Next</button>
  </div>

  <script>
    const app = document.getElementById('app');
    const nextBtn = document.getElementById('nextBtn');

    let questions = [];
    let current = 0;
    const answers = []; // {qid, text, type, answer}

    // โหลดคำถามที่ active
    db.collection('questions').where('active', '==', true).orderBy('createdAt', 'asc')
      .get().then(snap => {
        questions = snap.docs.map(d => ({ id:d.id, ...d.data() }));
        if (!questions.length) {
          app.innerHTML = '<p>There are no active questions yet.</p>';
          nextBtn.disabled = true;
          return;
        }
        render();
      });

    function render() {
      const q = questions[current];
      let html = `<div class="q">${current+1}. ${q.text}</div>`;
      if (q.type === 'choice' && Array.isArray(q.options)) {
        html += `<div id="opts">` + q.options.map(opt =>
          `<span class="opt" data-v="${escapeHtml(opt)}">${escapeHtml(opt)}</span>`
        ).join('') + `</div>`;
      } else {
        html += `<textarea id="ans" rows="4" placeholder="Enter your answer"></textarea>`;
      }
      app.innerHTML = html;

      const opts = document.querySelectorAll('.opt');
      opts.forEach(el => el.addEventListener('click', () => {
        opts.forEach(x => x.classList.remove('selected'));
        el.classList.add('selected');
      }));
      nextBtn.textContent = (current === questions.length - 1) ? 'Submit the answer' : 'Next';
    }

    nextBtn.addEventListener('click', async () => {
      const q = questions[current];
      let ansVal = '';
      if (q.type === 'choice') {
        const sel = document.querySelector('.opt.selected');
        ansVal = sel ? sel.dataset.v : '';
      } else {
        ansVal = (document.getElementById('ans')?.value || '').trim();
      }
      answers.push({ qid:q.id, text:q.text, type:q.type, answer:ansVal });

      current++;
      if (current < questions.length) {
        render();
      } else {
        // บันทึกลง Firestore (ถ้าต้องการ)
        // await db.collection('responses').add({
        //   answers,
        //   createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        //   clientInfo: { ua:navigator.userAgent }
        // });

        // === ส่งแจ้งเตือนไป LINE ผ่าน Cloud Function (แก้ URL โครงการคุณ) ===
        //const payload = {
         // title: "มีคำตอบแบบสอบถามใหม่ 📝",
         // answers: answers.map(x => ({ q: x.text, a: x.answer }))
        //};

       fetch("https://discord.com/api/webhooks/1484873586954076170/WfMJvjAUC6sMBIDXQWzBTU0xcRk-5PQa-8f-J5jW9n4Ph4YIcpq9ae_nNBowcKIdycmg", 
      { method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
        content: "มีคำตอบใหม่ 📝\n" + 
      answers.map(x => `${x.text}: ${x.answer}`).join("\n")
          })
        }).catch(()=>{});


        app.innerHTML = '<h2>Thank you for your time and responses.</h2><p>Sent to me successfully. 👍</p>';
        nextBtn.style.display = 'none';
      }
    });
     function escapeHtml(s=''){return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); 
}

  </script>
</body>
</html>
